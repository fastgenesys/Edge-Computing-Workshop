<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPIO17 · LED Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --void:#090c12;
      --panel:#101623;
      --panel-2:#151d2b;
      --inset:#0b0f17;
      --line:#202a39;
      --line-2:#2b3748;
      --text:#e9eef5;
      --muted:#6a7580;
      --amber:#ffb020;
      --amber-hi:#ffd873;
      --amber-core:#fff3d6;
      --amber-deep:#a85e05;
      --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
      --disp:'Space Grotesk',system-ui,sans-serif;
      --radius:20px;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}

    body{
      background:
        radial-gradient(1100px 560px at 50% -12%, #151e2d 0%, transparent 62%),
        var(--void);
      color:var(--text);
      font-family:var(--disp);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      -webkit-font-smoothing:antialiased;
    }

    /* faint PCB dot grid */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:radial-gradient(rgba(255,255,255,0.028) 1px, transparent 1px);
      background-size:22px 22px;
      pointer-events:none;
      z-index:0;
    }

    .rig{
      position:relative;
      z-index:1;
      width:100%;
      max-width:430px;
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.045),
        0 30px 60px -22px rgba(0,0,0,0.75);
      overflow:hidden;
      animation:rise .6s cubic-bezier(.2,.7,.2,1) both;
    }

    /* nameplate */
    .nameplate{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:15px 20px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,0.022), transparent);
    }
    .id{
      display:flex;
      align-items:center;
      gap:10px;
      font-family:var(--mono);
      font-size:12px;
      letter-spacing:.06em;
      color:var(--muted);
    }
    .id b{color:var(--text);font-weight:600;}
    .id .sep{color:var(--line-2);}
    .live{
      width:7px;height:7px;border-radius:50%;
      background:var(--amber);
      box-shadow:0 0 9px var(--amber);
    }
    .chip{
      font-family:var(--mono);
      font-size:10px;
      letter-spacing:.16em;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid var(--line-2);
      color:var(--muted);
      transition:color .4s ease, border-color .4s ease;
    }
    .rig.on .chip{color:var(--amber-hi);border-color:rgba(255,176,32,.4);}

    /* stage */
    .stage{padding:40px 28px 26px;text-align:center;}

    .led-wrap{
      position:relative;
      width:150px;height:150px;
      margin:0 auto 24px;
      display:grid;place-items:center;
    }
    .halo{
      position:absolute;
      width:240px;height:240px;border-radius:50%;
      background:radial-gradient(circle, rgba(255,176,32,.5) 0%, rgba(255,176,32,0) 66%);
      opacity:0;
      transition:opacity .55s ease;
    }
    .rig.on .halo{opacity:1;animation:breathe 4.5s ease-in-out infinite;}

    .led{
      position:relative;
      width:96px;height:96px;border-radius:50%;
      background:radial-gradient(circle at 38% 32%, #1b222d 0%, #0d121a 72%);
      border:1px solid rgba(255,255,255,0.06);
      box-shadow:0 6px 18px rgba(0,0,0,.55), inset 0 2px 7px rgba(0,0,0,.6);
      transition:background .5s ease, box-shadow .5s ease;
    }
    .rig.on .led{
      background:radial-gradient(circle at 42% 34%,
        var(--amber-core) 0%, var(--amber-hi) 26%, var(--amber) 56%, var(--amber-deep) 100%);
      box-shadow:
        0 0 24px 5px rgba(255,176,32,.55),
        0 0 64px 14px rgba(255,176,32,.3),
        inset 0 2px 9px rgba(255,240,200,.65);
    }
    .led::after{
      content:"";position:absolute;top:15px;left:22px;
      width:26px;height:17px;border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.75), transparent 72%);
      opacity:.14;transition:opacity .5s ease;
    }
    .rig.on .led::after{opacity:.9;}

    /* readouts */
    .state{
      font-size:26px;font-weight:600;letter-spacing:.03em;
      line-height:1;color:var(--muted);
      transition:color .4s ease;
    }
    .rig.on .state{color:var(--text);}
    .volt{
      margin-top:9px;
      font-family:var(--mono);
      font-size:12px;letter-spacing:.1em;
      color:var(--muted);
    }
    .volt b{color:var(--text);font-weight:500;transition:color .4s ease;}
    .rig.on .volt b{color:var(--amber-hi);}

    .divider{height:1px;background:var(--line);margin:26px 4px 22px;}

    /* toggle control */
    .control{display:flex;justify-content:center;}
    .switch{
      display:inline-flex;align-items:center;gap:15px;
      text-decoration:none;
      padding:9px 9px 9px 9px;border-radius:12px;
      transition:background .2s ease;
    }
    .switch:hover{background:rgba(255,255,255,0.03);}
    .track{
      width:62px;height:32px;border-radius:999px;
      background:var(--inset);
      border:1px solid var(--line-2);
      position:relative;
      transition:background .35s ease, border-color .35s ease, box-shadow .35s ease;
    }
    .knob{
      position:absolute;top:3px;left:3px;
      width:24px;height:24px;border-radius:50%;
      background:#7c8794;
      box-shadow:0 2px 5px rgba(0,0,0,.5);
      transition:left .35s cubic-bezier(.34,1.5,.5,1), background .35s ease, box-shadow .35s ease;
    }
    .rig.on .track{
      background:rgba(255,176,32,.16);
      border-color:rgba(255,176,32,.45);
      box-shadow:inset 0 0 14px rgba(255,176,32,.28);
    }
    .rig.on .knob{left:34px;background:var(--amber);box-shadow:0 0 12px var(--amber);}
    .switch-label{
      font-family:var(--mono);font-size:13px;letter-spacing:.04em;
      color:var(--text);min-width:58px;text-align:left;
    }
    .switch:focus-visible{outline:2px solid var(--amber);outline-offset:3px;}

    /* terminal log */
    .log{
      margin-top:22px;padding:11px 14px;
      background:var(--inset);
      border:1px solid var(--line);
      border-radius:10px;
      font-family:var(--mono);
      font-size:12px;letter-spacing:.02em;
      color:var(--text);
      text-align:left;
      display:flex;align-items:center;gap:8px;
      min-height:40px;
    }
    .log .prompt{color:var(--amber);font-weight:600;}
    .log.idle{color:var(--muted);}
    .cursor{
      width:7px;height:14px;background:var(--amber);
      display:inline-block;margin-left:auto;
      animation:blink 1.1s step-end infinite;
    }

    @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
    @keyframes breathe{0%,100%{opacity:.78;}50%{opacity:1;}}
    @keyframes blink{0%,50%{opacity:1;}51%,100%{opacity:0;}}

    @media (prefers-reduced-motion: reduce){
      .rig{animation:none;}
      .rig.on .halo{animation:none;}
      .cursor{animation:none;}
      *{transition:none !important;}
    }
  </style>
</head>
<body>

  <div class="rig {% if state %}on{% else %}off{% endif %}">

    <div class="nameplate">
      <div class="id">
        <span class="live"></span>
        <span><b>GPIO17</b> <span class="sep">·</span> PIN 11</span>
      </div>
      <div class="chip">{% if state %}ACTIVE{% else %}STANDBY{% endif %}</div>
    </div>

    <div class="stage">
      <div class="led-wrap">
        <div class="halo"></div>
        <div class="led"></div>
      </div>

      <div class="state">{% if state %}ON{% else %}OFF{% endif %}</div>
      <div class="volt">OUTPUT&nbsp;&nbsp;<b>{% if state %}3.3&nbsp;V{% else %}0.0&nbsp;V{% endif %}</b></div>

      <div class="divider"></div>

      <div class="control">
        <a class="switch"
           href="{% if state %}/off{% else %}/on{% endif %}"
           aria-label="{% if state %}Turn LED off{% else %}Turn LED on{% endif %}">
          <span class="track"><span class="knob"></span></span>
          <span class="switch-label">{% if state %}Turn off{% else %}Turn on{% endif %}</span>
        </a>
      </div>

      <div class="log{% if not message %} idle{% endif %}">
        <span class="prompt">&gt;</span>
        <span>{% if message %}{{ message }}{% else %}ready · awaiting command{% endif %}</span>
        <span class="cursor"></span>
      </div>
    </div>

  </div>

</body>
</html>
